<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VistaReal Estates • New Mexico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100">

    <!-- Navbar -->
   <!-- Improved Navbar - Works on both desktop and mobile -->
<!-- Fixed Mobile-Friendly Navbar -->
<nav class="bg-zinc-900 border-b border-amber-900/30 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5">
        <div class="flex justify-between items-center">
            <!-- Logo -->
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-mountain-sun text-4xl text-amber-400"></i>
                <span class="text-3xl font-bold tracking-tighter">VistaReal</span>
            </div>

            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center gap-8">
                <div class="bg-zinc-800 rounded-3xl p-1 flex">
                    <button onclick="setMode('buy')" id="buy-btn" class="px-8 py-3 rounded-3xl transition">BUY</button>
                    <button onclick="setMode('rent')" id="rent-btn" class="px-8 py-3 rounded-3xl transition">RENT</button>
                </div>
                <a href="#" onclick="showFavorites()" class="hover:text-amber-400 flex items-center gap-2">
                    <i class="fa-solid fa-heart"></i> 
                    Favorites <span id="nav-fav-count" class="text-amber-400">(0)</span>
                </a>
            </div>

            <!-- Mobile Right Side -->
            <div class="flex items-center gap-4 md:hidden">
                <button onclick="toggleMobileMenu()" class="text-3xl p-2">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>

            <!-- List Property Button (visible on all screens) -->
            <button onclick="alert('Listing form coming soon!')" 
                    class="hidden md:block bg-amber-400 hover:bg-amber-500 text-zinc-950 font-semibold px-6 py-3 rounded-2xl text-sm">
                LIST PROPERTY
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-zinc-900 px-6 py-8 border-t border-zinc-800">
        <div class="flex flex-col gap-6 text-lg">
            <div class="bg-zinc-800 rounded-3xl p-1 flex">
                <button onclick="setMode('buy'); toggleMobileMenu()" 
                        class="flex-1 py-4 rounded-3xl transition">BUY</button>
                <button onclick="setMode('rent'); toggleMobileMenu()" 
                        class="flex-1 py-4 rounded-3xl transition">RENT</button>
            </div>
            <a href="#" onclick="showFavorites(); toggleMobileMenu()" 
               class="hover:text-amber-400 flex items-center gap-3 py-3">
                <i class="fa-solid fa-heart"></i> My Favorites
            </a>
            <button onclick="alert('Listing form coming soon!'); toggleMobileMenu()" 
                    class="bg-amber-400 hover:bg-amber-500 text-zinc-950 font-semibold py-4 rounded-2xl">
                LIST YOUR PROPERTY
            </button>
        </div>
    </div>
</nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-zinc-900 px-6 py-6 border-t border-zinc-800">
        <div class="flex flex-col gap-6 text-lg">
            <div class="bg-zinc-800 rounded-3xl p-1 flex">
                <button onclick="setMode('buy'); toggleMobileMenu()" id="mobile-buy-btn" 
                        class="flex-1 py-4 rounded-3xl transition">BUY</button>
                <button onclick="setMode('rent'); toggleMobileMenu()" id="mobile-rent-btn" 
                        class="flex-1 py-4 rounded-3xl transition">RENT</button>
            </div>
            <a href="#" onclick="showFavorites(); toggleMobileMenu()" class="hover:text-amber-400 flex items-center gap-2">
                <i class="fa-solid fa-heart"></i> My Favorites
            </a>
        </div>
    </div>
</nav>

    <!-- Hero -->
    <header class="relative h-screen flex items-center bg-cover bg-center" style="background-image: url('https://picsum.photos/id/1015/2000/1200');">
        <div class="absolute inset-0 bg-gradient-to-b from-black/40 to-black/80"></div>
        <div class="relative max-w-5xl mx-auto text-center px-6">
            <h1 id="hero-title" class="text-6xl md:text-7xl font-bold tracking-tighter">Find Your Perfect New Mexico Home</h1>
            <p class="text-2xl text-zinc-300 mt-4">Albuquerque • Santa Fe • Taos</p>
        </div>
    </header>

    <!-- Filters -->
    <div class="max-w-7xl mx-auto px-6 py-8 sticky top-16 bg-zinc-950 z-40 border-b border-zinc-800">
        <div class="bg-zinc-900 p-6 rounded-3xl flex flex-wrap gap-6 items-center">
            <select id="property-type" onchange="applyFilters()" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4">
                <option value="">All Types</option>
                <option value="House">House</option>
                <option value="Villa">Villa</option>
                <option value="Apartment">Apartment</option>
                <option value="Loft">Loft</option>
            </select>

            <select id="sort-by" onchange="applyFilters()" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4">
                <option value="price-low">Price Low to High</option>
                <option value="price-high">Price High to Low</option>
                <option value="beds">Most Bedrooms</option>
            </select>

            <div class="flex-1 min-w-[280px]">
                <div class="flex justify-between text-xs text-zinc-400 mb-1">
                    <span id="price-label">PRICE RANGE</span>
                    <span id="current-price-display">$2M+</span>
                </div>
                <input type="range" id="price-range" min="800" max="2000000" value="2000000" step="10000"
                       oninput="updatePriceLabel(); applyFilters()" class="w-full accent-amber-400">
            </div>

            <button onclick="resetAllFilters()" class="text-sm hover:text-amber-400">Clear</button>
        </div>
    </div>

    <!-- Properties Grid -->
    <section class="max-w-7xl mx-auto px-6 py-12">
        <h2 id="section-title" class="text-4xl font-bold mb-8">Homes For Sale</h2>
        <div id="properties-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <!-- Modal -->
    <div id="property-modal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
        <div class="bg-zinc-900 rounded-3xl max-w-5xl w-full max-h-[92vh] overflow-hidden modal-content flex flex-col">
            <div class="relative">
                <button onclick="closeModal()" class="absolute top-6 right-6 text-5xl text-white z-50 bg-black/60 hover:bg-black w-12 h-12 rounded-2xl flex items-center justify-center">×</button>
                <img id="modal-main-image" class="w-full h-80 md:h-96 object-cover" alt="">
                <button onclick="prevImage()" class="absolute left-6 top-1/2 -translate-y-1/2 bg-black/70 text-white w-12 h-12 rounded-2xl text-3xl">←</button>
                <button onclick="nextImage()" class="absolute right-6 top-1/2 -translate-y-1/2 bg-black/70 text-white w-12 h-12 rounded-2xl text-3xl">→</button>
            </div>

            <div class="px-8 pt-5 pb-3 border-b border-zinc-800 bg-zinc-900">
                <div id="thumbnail-gallery" class="flex gap-4 overflow-x-auto"></div>
            </div>

            <div class="flex-1 overflow-y-auto p-8 space-y-10">
                <div>
                    <h1 id="modal-title" class="text-4xl font-bold"></h1>
                    <p id="modal-location" class="text-amber-400 text-2xl"></p>
                    <div id="modal-price" class="text-5xl font-bold text-amber-400 mt-4"></div>
                </div>

                <div class="grid grid-cols-3 gap-6 text-center">
                    <div><i class="fa-solid fa-bed text-3xl"></i><br><span id="modal-beds" class="text-2xl font-semibold"></span> Beds</div>
                    <div><i class="fa-solid fa-bath text-3xl"></i><br><span id="modal-baths" class="text-2xl font-semibold"></span> Baths</div>
                    <div><i class="fa-solid fa-ruler-combined text-3xl"></i><br><span id="modal-sqft" class="text-2xl font-semibold"></span> sqft</div>
                </div>

                <p id="modal-description" class="text-zinc-300"></p>

                <!-- Mortgage Calculator -->
                <div class="bg-zinc-800 p-6 rounded-3xl">
                    <h3 class="font-semibold mb-4">Mortgage Calculator</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input id="down-payment" type="number" value="20" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3">
                        <input id="interest-rate" type="number" value="6.5" step="0.1" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3">
                    </div>
                    <button onclick="calculateMortgage()" class="mt-6 w-full bg-amber-400 text-zinc-950 font-bold py-4 rounded-2xl">Calculate</button>
                    <div id="mortgage-result" class="mt-6 text-center text-2xl font-bold text-amber-400 hidden"></div>
                </div>

                <!-- Contact Agent Form -->
                <div class="bg-zinc-800 p-6 rounded-3xl">
                    <h3 class="font-semibold mb-4">Contact Agent</h3>
                    <div class="space-y-4">
                        <input id="contact-name" type="text" placeholder="Your Full Name" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                        <input id="contact-email" type="email" placeholder="Email Address" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                        <input id="contact-phone" type="tel" placeholder="Phone Number" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                        <textarea id="contact-message" rows="4" placeholder="Message or questions (optional)" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4"></textarea>
                    </div>
                    <button onclick="submitContactForm()" class="mt-6 w-full bg-amber-400 hover:bg-amber-500 text-zinc-950 font-bold py-5 rounded-2xl transition">
                        SEND MESSAGE TO AGENT
                    </button>
                </div>

                <button onclick="scheduleViewing()" class="w-full bg-white text-zinc-950 font-bold py-5 rounded-2xl">Schedule a Viewing</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
